version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: botrent-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saas_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saas_db"]
      interval: 5s
      retries: 5
    networks:
      - botrent-network

  redis:
    image: redis:7-alpine
    container_name: botrent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - botrent-network

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: botrent-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/saas_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      YUKASSA_SHOP_ID: ${YUKASSA_SHOP_ID}
      YUKASSA_SECRET_KEY: ${YUKASSA_SECRET_KEY}
      ADMIN_TELEGRAM_ID: ${ADMIN_TELEGRAM_ID}
      BOT_TOKEN: ${BOT_TOKEN}
      NODE_ENV: production
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    networks:
      - botrent-network

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: botrent-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api
    networks:
      - botrent-network

  nginx:
    image: nginx:alpine
    container_name: botrent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - botrent-network

volumes:
  pgdata:

networks:
  botrent-network:
    driver: bridge
