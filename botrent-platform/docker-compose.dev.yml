

services:
  postgres:
    image: postgres:16-alpine
    container_name: botrent-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: botrent_user
      POSTGRES_PASSWORD: strong_password_here
      POSTGRES_DB: botrent_db
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botrent_user -d botrent_db"]
      interval: 5s
      retries: 5
    networks:
      - botrent-network-dev

  redis:
    image: redis:7-alpine
    container_name: botrent-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    networks:
      - botrent-network-dev

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: botrent-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://botrent_user:strong_password_here@postgres:5432/botrent_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_jwt_secret
      JWT_REFRESH_SECRET: dev_jwt_refresh_secret
      YUKASSA_SHOP_ID: test_shop_id
      YUKASSA_SECRET_KEY: test_secret_key
      ADMIN_TELEGRAM_ID: test_admin_id
      BOT_TOKEN: test_bot_token
      NODE_ENV: development
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npm run start:dev"
    networks:
      - botrent-network-dev

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: botrent-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000/api
    networks:
      - botrent-network-dev

  nginx:
    image: nginx:alpine
    container_name: botrent-nginx-dev
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - botrent-network-dev

volumes:
  pgdata_dev:

networks:
  botrent-network-dev:
    driver: bridge
